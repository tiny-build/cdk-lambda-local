name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Version or Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpx nx run-many --target=build --all

      - name: Compute release label
        id: next_release
        run: |
          pnpm changeset status --output=.changeset-status.json || true
          node <<'NODE'
          const fs = require('node:fs');

          let label = 'pending-release';

          try {
            const status = JSON.parse(fs.readFileSync('.changeset-status.json', 'utf8'));
            const releases = Array.isArray(status.releases) ? status.releases : [];

            if (releases.length > 0) {
              const target = releases.find((release) => release.name === 'aws-cdk-local-lambda');
              if (target) {
                label = `${target.name}@${target.newVersion}`;
              }
            }
          } catch {
            // Keep fallback label when there are no pending release entries.
          }

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `label=${label}\n`);
          NODE

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          title: "ci: release ${{ steps.next_release.outputs.label }}"
          commit: "ci: release ${{ steps.next_release.outputs.label }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Required for npm trusted publishing (OIDC) so npm publish exchanges
          # the GitHub OIDC token for a short-lived npm publish token.
          NPM_CONFIG_PROVENANCE: true
          NPM_CONFIG_ACCESS: public
